# 1. Database Connection (The Address)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vibesync_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Avneesh@2006}

# 2. Hibernate Settings (The Translator)
# 'update' means Spring will automatically create tables for you in the DB
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:your_very_long_secret_random_string_here_at_least_32_chars}

# OAuth2 Client Configurations
# Replace these with your actual OAuth app credentials

# Google OAuth
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.scope=${GOOGLE_OAUTH_SCOPE:openid,profile,email}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

# GitHub OAuth
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-client-secret}
spring.security.oauth2.client.registration.github.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.github.scope=${GITHUB_OAUTH_SCOPE:user:email}
spring.security.oauth2.client.registration.github.redirect-uri=${GITHUB_OAUTH_REDIRECT_URI:http://localhost:8080/login/oauth2/code/github}

# Spotify OAuth
spring.security.oauth2.client.registration.spotify.client-id=${SPOTIFY_CLIENT_ID:your-spotify-client-id}
spring.security.oauth2.client.registration.spotify.client-secret=${SPOTIFY_CLIENT_SECRET:your-spotify-client-secret}
spring.security.oauth2.client.registration.spotify.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.spotify.scope=${SPOTIFY_OAUTH_SCOPE:user-read-email,user-read-private}
spring.security.oauth2.client.registration.spotify.redirect-uri=${SPOTIFY_OAUTH_REDIRECT_URI:http://localhost:8080/login/oauth2/code/spotify}
spring.security.oauth2.client.provider.spotify.authorization-uri=https://accounts.spotify.com/authorize
spring.security.oauth2.client.provider.spotify.token-uri=https://accounts.spotify.com/api/token
spring.security.oauth2.client.provider.spotify.user-info-uri=https://api.spotify.com/v1/me
spring.security.oauth2.client.provider.spotify.user-name-attribute=id