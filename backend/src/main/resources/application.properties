# Datasource URL/username/password are provided by FlexibleDataSourceConfiguration (local → Supabase → SPRING_DATASOURCE_*).
# See backend/.env.example

# Small pool for Render free tier (512MB) + few concurrent users
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}

server.port=${PORT:8080}

# Free-tier safety: block huge JSON bodies (e.g. pasted base64 images) from exhausting RAM
server.tomcat.max-http-form-post-size=512KB
server.tomcat.max-swallow-size=512KB

management.endpoints.web.exposure.include=health,actuator
management.endpoint.health.show-details=${ACTUATOR_HEALTH_DETAILS:when_authorized}

# OAuth2 — set all values via environment / backend/.env (never commit secrets)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:unset-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:unset-google-client-secret}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.scope=${GOOGLE_OAUTH_SCOPE:openid,profile,email}
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_PUBLIC_URL:http://localhost:8080}/login/oauth2/code/google

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:unset-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:unset-github-client-secret}
spring.security.oauth2.client.registration.github.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.github.scope=${GITHUB_OAUTH_SCOPE:user:email}
spring.security.oauth2.client.registration.github.redirect-uri=${BACKEND_PUBLIC_URL:http://localhost:8080}/login/oauth2/code/github

spring.security.oauth2.client.registration.spotify.provider=spotify
spring.security.oauth2.client.registration.spotify.client-id=${SPOTIFY_CLIENT_ID:unset-spotify-client-id}
spring.security.oauth2.client.registration.spotify.client-secret=${SPOTIFY_CLIENT_SECRET:unset-spotify-client-secret}
spring.security.oauth2.client.registration.spotify.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.spotify.scope=${SPOTIFY_OAUTH_SCOPE:user-read-email,user-read-private}
spring.security.oauth2.client.registration.spotify.redirect-uri=${BACKEND_PUBLIC_URL:http://localhost:8080}/login/oauth2/code/spotify
spring.security.oauth2.client.provider.spotify.authorization-uri=https://accounts.spotify.com/authorize
spring.security.oauth2.client.provider.spotify.token-uri=https://accounts.spotify.com/api/token
spring.security.oauth2.client.provider.spotify.user-info-uri=https://api.spotify.com/v1/me
spring.security.oauth2.client.provider.spotify.user-name-attribute=id
